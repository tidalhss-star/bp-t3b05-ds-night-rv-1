    <style>
        /* RESET & BASE */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; font-size:16px; }
        body {
            background:#0a0a0a;
            color:#e0e0e0;
            font-family:'Courier New', Courier, monospace;
            line-height:1.6;
            overflow-x:hidden;
            position:relative;
            min-height:100vh;
        }
        /* RAW CSS TEXTURE - glitch effect */
        body::after {
            content:'';
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            pointer-events:none;
            background: repeating-linear-gradient(0deg, rgba(57,255,20,0.03) 2px, transparent 2px, transparent 6px);
            animation: glitchScan 0.3s infinite linear;
            z-index:9999;
        }
        @keyframes glitchScan {
            0% { transform:translateY(0); }
            100% { transform:translateY(4px); }
        }
        a { color:#39ff14; text-decoration:none; border-bottom:2px solid transparent; transition:0.2s; }
        a:hover { color:#fff; border-bottom-color:#39ff14; text-shadow:0 0 8px #39ff14; }
        ul, ol { list-style:none; }
        img { max-width:100%; height:auto; display:block; }

        /* TYPOGRAPHY */
        h1, h2, h3, h4 { font-weight:700; text-transform:uppercase; letter-spacing:2px; }
        h1 { font-size:2.8rem; color:#39ff14; text-shadow:0 0 10px #39ff14, 0 0 20px #0a0a0a; margin-bottom:1rem; }
        h2 { font-size:2rem; color:#f0f0f0; border-left:6px solid #39ff14; padding-left:1rem; margin-bottom:1.5rem; }
        h3 { font-size:1.4rem; color:#d0d0d0; margin-bottom:0.8rem; }
        p { margin-bottom:1.2rem; font-size:1.05rem; }
        .small { font-size:0.85rem; opacity:0.7; }

        /* LAYOUT */
        .container { max-width:1200px; margin:0 auto; padding:0 20px; }
        .full-width { width:100%; }

        /* NAV */
        nav {
            background: #111;
            border-bottom:3px solid #39ff14;
            padding:1rem 0;
            position:sticky;
            top:0;
            z-index:100;
        }
        .nav-inner {
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
        }
        .nav-logo {
            font-size:1.8rem;
            font-weight:bold;
            color:#39ff14;
            text-transform:uppercase;
            text-decoration:none;
            letter-spacing:3px;
        }
        .nav-links {
            display:flex;
            gap:2rem;
            align-items:center;
        }
        .nav-links a {
            font-size:1rem;
            text-transform:uppercase;
            letter-spacing:1px;
        }
        .tel-link {
            background:#39ff14;
            color:#0a0a0a;
            padding:0.5rem 1.5rem;
            border-radius:0;
            font-weight:bold;
            text-decoration:none;
            transition:0.2s;
        }
        .tel-link:hover {
            background:#fff;
            color:#0a0a0a;
            border-bottom:none;
        }
        .hamburger {
            display:none;
            flex-direction:column;
            cursor:pointer;
            gap:5px;
        }
        .hamburger span {
            width:30px; height:3px;
            background:#39ff14;
            transition:0.3s;
        }
        @media (max-width:768px) {
            .hamburger { display:flex; }
            .nav-links {
                display:none;
                width:100%;
                flex-direction:column;
                background:#111;
                padding:1rem 0;
                gap:1rem;
            }
            .nav-links.active { display:flex; }
            .tel-link { align-self:flex-start; }
        }

        /* HERO SECTION */
        .hero {
            padding:5rem 0 3rem;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
            border-bottom:3px solid #39ff14;
            text-align:center;
        }
        .hero h1 {
            font-size:3rem;
            margin-bottom:1.5rem;
        }
        .hero p {
            font-size:1.2rem;
            max-width:800px;
            margin:0 auto 2rem;
            opacity:0.9;
        }

        /* BLOG POST */
        .blog-post {
            padding:3rem 0;
        }
        .blog-post .post-meta {
            display:flex;
            gap:2rem;
            margin-bottom:2rem;
            font-size:0.9rem;
            color:#888;
            text-transform:uppercase;
            letter-spacing:1px;
        }
        .blog-post .post-content {
            font-size:1.1rem;
            line-height:1.8;
        }
        .blog-post .post-content h2 {
            margin-top:2.5rem;
        }
        .data-box {
            background:#1a1a1a;
            border-left:5px solid #39ff14;
            padding:1.5rem;
            margin:2rem 0;
            font-family:'Courier New', monospace;
        }
        .data-box p { margin-bottom:0.5rem; }
        .data-box .stat { font-size:2rem; color:#39ff14; font-weight:bold; }

        /* FAQ */
        .faq-section {
            padding:3rem 0;
            background:#111;
            border-top:3px solid #39ff14;
        }
        .faq-grid {
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:2rem;
        }
        .faq-item {
            background:#1a1a1a;
            padding:1.5rem;
            border:1px solid #333;
        }
        .faq-item h3 {
            color:#39ff14;
            margin-bottom:1rem;
            font-size:1.1rem;
        }
        .faq-item p {
            font-size:0.95rem;
            opacity:0.9;
        }
        @media (max-width:768px) {
            .faq-grid { grid-template-columns:1fr; }
        }

        /* FOOTER */
        footer {
            background:#0a0a0a;
            border-top:2px solid #39ff14;
            padding:2rem 0;
            text-align:center;
        }
        footer p { margin:0; font-size:0.9rem; opacity:0.6; }

        /* UTILITY */
        .text-center { text-align:center; }
        .mt-2 { margin-top:2rem; }
        .mb-2 { margin-bottom:2rem; }
        .glow { text-shadow:0 0 10px #39ff14; }
    </style>
</head>
